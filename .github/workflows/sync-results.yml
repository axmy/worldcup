name: Sync match results

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Ping sync endpoint
        run: |
          curl -sS -f -X GET "${{ secrets.SYNC_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
